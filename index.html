<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SHS Memoirs | Home</title>
    <style>
        /* This adds a smooth glow effect to the gold */
        .gold-glow {
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0a0f1d] text-white font-sans overflow-x-hidden">

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-[#fbbf24] font-bold text-xl tracking-tighter gold-glow">MEMOIRS</div>
        <ul class="flex gap-4 md:gap-8 text-[10px] font-bold uppercase tracking-widest text-gray-400">
            <li><a href="index.html" class="text-white border-b-2 border-[#fbbf24] pb-1">Home</a></li>
            <li><a href="gallery.html" class="hover:text-white">Gallery</a></li>
            <li><a href="achievements.html" class="hover:text-white">Awards</a></li>
            <li><a href="squad.html" class="hover:text-white">Squad</a></li>
        </ul>
    </nav>

    <header class="relative min-h-[85vh] flex flex-col items-center justify-center px-6">
        
        <h1 class="absolute text-[12vw] font-black text-white/[0.02] select-none pointer-events-none uppercase">
            Humanities
        </h1>

        <div class="z-10 w-full max-w-6xl flex flex-col md:flex-row items-center justify-between">
            
            <div class="w-full md:w-1/2 text-center md:text-left mb-12 md:mb-0">
                <div class="inline-block px-4 py-1 rounded-full border border-[#fbbf24]/30 text-[#fbbf24] text-xs font-bold mb-6">
                    MUNTINDILAW NATIONAL HIGH SCHOOL
                </div>
                <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-tight leading-tight">
                    Every <span class="text-[#fbbf24] gold-glow italic">Moment</span> <br>Matters.
                </h2>
                <p class="text-gray-400 text-sm md:text-base max-w-sm mb-8 leading-relaxed">
                    A digital archive of my Senior High School journey. Pictures, achievements, and the people who made it worth it.
                </p>
                <a href="gallery.html" class="glass px-8 py-4 rounded-xl font-bold hover:bg-[#fbbf24] hover:text-[#0a0f1d] transition-all inline-block">
                    Start Exploring →
                </a>
            </div>

            <div class="w-full md:w-1/2 flex justify-center relative">
                <div class="absolute w-72 h-72 bg-[#fbbf24] rounded-full blur-[100px] opacity-20"></div>
                
                <div class="relative glass rounded-3xl p-4 md:p-8 border-[#fbbf24]/20 shadow-2xl">
                    <img src="your-photo.png" alt="My Portrait" class="w-full max-w-[280px] md:max-w-[400px] drop-shadow-2xl">
                    
                    <div class="absolute -bottom-6 -left-6 glass p-4 rounded-2xl hidden md:block">
                        <p class="text-[#fbbf24] font-bold text-lg leading-none">Class of '26</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">HUMSS Strand</p>
                    </div>
                </div>
            </div>

        </div>
    </header>

</body>
</html>
